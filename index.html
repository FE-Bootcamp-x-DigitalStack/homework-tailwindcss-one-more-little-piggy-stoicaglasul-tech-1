<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailwindCSS | One little piggy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-pig-head: #F9BECA;
        --color-pig-snout: #F46E86;
        --color-pig-black: #000000;
        --color-pig-white: #FFFFFF;
      }

      @layer base {
        body {
          @apply bg-white min-h-screen flex flex-col items-center justify-center;
        }
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="relative w-72 h-72 bg-pig-head border-8 border-pig-black rounded-full">
      
      <div class="absolute -top-6 left-4 w-28 h-28 bg-pig-head border-8 border-pig-black rounded-full -z-10"></div>
      <div class="absolute -top-6 right-4 w-28 h-28 bg-pig-head border-8 border-pig-black rounded-full -z-10"></div>

      <div class="flex justify-around mt-16 px-6">
        <div class="w-20 h-20 bg-pig-white border-8 border-pig-black rounded-full flex items-center justify-center">
          <div class="w-8 h-8 bg-pig-black rounded-full"></div>
        </div>
        <div class="w-20 h-20 bg-pig-white border-8 border-pig-black rounded-full flex items-center justify-center">
          <div class="w-8 h-8 bg-pig-black rounded-full"></div>
        </div>
      </div>

      <div class="absolute bottom-9 left-1/2 -translate-x-1/2 w-40 h-20 bg-pig-snout border-8 border-pig-black rounded-full flex items-center justify-center gap-12">
        <div class="w-4 h-6 bg-pig-black rounded-full"></div>
        <div class="w-4 h-6 bg-pig-black rounded-full"></div>
      </div>

    </div>
  </body>
</html>
