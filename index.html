<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailwindCSS | One little piggy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-pig-head: #F9BECA;
        --color-pig-snout: #F46E86;
        --color-pig-black: #000000;
        --color-pig-white: #FFFFFF;
      }

      @layer base {
        body {
          @apply bg-white min-h-screen flex flex-col items-center justify-center;
        }
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="relative w-72 h-72 bg-pig-head border-8 border-pig-black rounded-full">
       </div>
  </body>
</html>
