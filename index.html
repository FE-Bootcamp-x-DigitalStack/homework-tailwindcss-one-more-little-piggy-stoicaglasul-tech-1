<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailwindCSS | Final Responsive Piggy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-pig-head: #F9BECA;
        --color-pig-snout: #F46E86;
        --color-pig-black: #000000;
        --color-pig-white: #FFFFFF;
      }

      @layer base {
        body {
          @apply bg-white min-h-screen flex items-center justify-center overflow-hidden;
        }
      }
    </style>
  </head>
  <body>
    <div class="relative w-56 h-56 sm:w-72 sm:h-72 bg-pig-head border-8 border-pig-black rounded-full">
      
      <div class="absolute -top-4 left-4 w-20 h-20 sm:-top-6 sm:w-28 sm:h-28 bg-pig-head border-8 border-pig-black rounded-full -z-10"></div>
      <div class="absolute -top-4 right-4 w-20 h-20 sm:-top-6 sm:w-28 sm:h-28 bg-pig-head border-8 border-pig-black rounded-full -z-10"></div>

      <div class="flex justify-around mt-10 sm:mt-16 px-4 sm:px-6">
        <div class="w-16 h-16 sm:w-20 sm:h-20 bg-pig-white border-8 border-pig-black rounded-full flex items-center justify-center">
          <div class="w-6 h-6 sm:w-8 sm:h-8 bg-pig-black rounded-full"></div>
        </div>
        <div class="w-16 h-16 sm:w-20 sm:h-20 bg-pig-white border-8 border-pig-black rounded-full flex items-center justify-center">
          <div class="w-6 h-6 sm:w-8 sm:h-8 bg-pig-black rounded-full"></div>
        </div>
      </div>

      <div class="absolute bottom-6 sm:bottom-9 left-1/2 -translate-x-1/2 w-32 h-16 sm:w-40 sm:h-20 bg-pig-snout border-8 border-pig-black rounded-full flex items-center justify-center gap-8 sm:gap-12">
        <div class="w-3 h-5 sm:w-4 sm:h-6 bg-pig-black rounded-full"></div>
        <div class="w-3 h-5 sm:w-4 sm:h-6 bg-pig-black rounded-full"></div>
      </div>

    </div>
  </body>
</html>
